<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JURAGAN X REZXIT · File & Mod Premium FF</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0e17;
            color: #fff;
            line-height: 1.5;
            overflow-x: hidden;
            width: 100%;
            position: relative;
        }

        /* Navbar - Optimasi Mobile */
        .navbar {
            background: rgba(10, 15, 25, 0.98);
            padding: 0.8rem 4%;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #ff6b8133;
            backdrop-filter: blur(10px);
            width: 100%;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f7b731, #ff6b81);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }

        /* Mobile Menu */
        .nav-links {
            display: none;
            width: 100%;
            position: absolute;
            top: 100%;
            left: 0;
            background: #0a0e17;
            padding: 1rem;
            border-bottom: 2px solid #ff6b81;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .nav-links.show {
            display: block;
        }

        .nav-links a {
            display: block;
            text-decoration: none;
            font-weight: 600;
            color: #cbd5e8;
            font-size: 1rem;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            margin: 0.2rem 0;
        }

        .nav-links a:hover,
        .nav-links a.active {
            background: #ff6b8120;
            color: #ff6b81;
        }

        .menu-toggle {
            display: block;
            font-size: 1.8rem;
            color: #ff6b81;
            cursor: pointer;
        }

        /* Container */
        .container {
            width: 100%;
            padding: 1rem 4%;
            max-width: 100%;
            overflow-x: hidden;
        }

        /* Hero Section - Mobile First */
        .hero-title {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.2;
            background: linear-gradient(135deg, #fff, #ffb347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.8rem;
        }

        .hero-sub {
            font-size: 0.9rem;
            color: #a0b5d4;
            margin-bottom: 1.2rem;
        }

        /* Features Grid - Mobile */
        .features-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            margin: 1.5rem 0;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #ff6b8133;
            border-radius: 15px;
            padding: 1rem 0.5rem;
            text-align: center;
        }

        .feature-icon {
            font-size: 1.5rem;
            color: #ff9f7c;
            margin-bottom: 0.5rem;
        }

        .feature-card h4 {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .feature-card p {
            font-size: 0.7rem;
            color: #94a9c5;
        }

        /* Section Label */
        .section-label {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 1.2rem 0 0.5rem;
            background: linear-gradient(135deg, #fcb69f, #ffd6a5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section-desc {
            color: #94a9c5;
            font-size: 0.9rem;
            margin-bottom: 1.2rem;
            border-left: 3px solid #ff6b81;
            padding-left: 0.8rem;
        }

        /* Student Special Banner - DENGAN API BERGERAK */
        .student-banner {
            background: linear-gradient(135deg, #ff6b81, #ff9f7c);
            border-radius: 20px;
            padding: 1.2rem;
            margin: 1.5rem 0;
            text-align: center;
            border: 2px solid #ffd700;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .student-banner:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 40px rgba(255, 107, 129, 0.5);
        }

        /* API Bergerak di kiri dan kanan */
        .student-banner::before {
            content: '🔥';
            position: absolute;
            font-size: 4rem;
            opacity: 0.2;
            left: 5px;
            top: 50%;
            transform: translateY(-50%);
            animation: apiKiri 2s ease-in-out infinite;
        }

        .student-banner::after {
            content: '🔥';
            position: absolute;
            font-size: 4rem;
            opacity: 0.2;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            animation: apiKanan 2s ease-in-out infinite;
            animation-delay: 0.5s;
        }

        /* API tambahan di atas dan bawah */
        .student-banner .api-atas {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            animation: apiAtas 1.5s ease-in-out infinite;
            filter: drop-shadow(0 0 10px #ff6b81);
        }

        .student-banner .api-bawah {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            animation: apiBawah 1.5s ease-in-out infinite;
            filter: drop-shadow(0 0 10px #ff6b81);
            animation-delay: 0.3s;
        }

        /* API di dalam teks */
        .student-banner h3 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            position: relative;
            display: inline-block;
        }

        .student-banner h3 .api-inline {
            display: inline-block;
            animation: apiInline 1s ease-in-out infinite;
            margin: 0 0.2rem;
        }

        .student-banner h3 .api-inline:nth-child(1) { animation-delay: 0s; }
        .student-banner h3 .api-inline:nth-child(2) { animation-delay: 0.2s; }
        .student-banner h3 .api-inline:nth-child(3) { animation-delay: 0.4s; }

        /* Animasi API */
        @keyframes apiKiri {
            0%, 100% { 
                transform: translateY(-50%) scale(1) rotate(-5deg);
                opacity: 0.2;
            }
            50% { 
                transform: translateY(-70%) scale(1.3) rotate(5deg);
                opacity: 0.4;
                filter: drop-shadow(0 0 15px #ffaa00);
            }
        }

        @keyframes apiKanan {
            0%, 100% { 
                transform: translateY(-50%) scale(1) rotate(5deg);
                opacity: 0.2;
            }
            50% { 
                transform: translateY(-30%) scale(1.3) rotate(-5deg);
                opacity: 0.4;
                filter: drop-shadow(0 0 15px #ffaa00);
            }
        }

        @keyframes apiAtas {
            0%, 100% { 
                transform: translateX(-50%) translateY(0) scale(1);
                opacity: 0.3;
            }
            50% { 
                transform: translateX(-50%) translateY(-10px) scale(1.3);
                opacity: 0.6;
                filter: drop-shadow(0 0 20px #ff5500);
            }
        }

        @keyframes apiBawah {
            0%, 100% { 
                transform: translateX(-50%) translateY(0) scale(1);
                opacity: 0.3;
            }
            50% { 
                transform: translateX(-50%) translateY(10px) scale(1.3);
                opacity: 0.6;
                filter: drop-shadow(0 0 20px #ff5500);
            }
        }

        @keyframes apiInline {
            0%, 100% { 
                transform: scale(1) rotate(0deg);
                filter: drop-shadow(0 0 5px #ffaa00);
            }
            50% { 
                transform: scale(1.3) rotate(10deg);
                filter: drop-shadow(0 0 15px #ff5500);
            }
        }

        .student-banner p {
            font-size: 0.9rem;
            color: #1a1e2b;
            font-weight: 600;
            position: relative;
            z-index: 2;
        }

        .clickable-text {
            background: #1a1e2b;
            color: #ffd700;
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            display: inline-block;
            margin-top: 0.8rem;
            font-weight: 600;
            border: 2px solid white;
            font-size: 1rem;
            position: relative;
            z-index: 2;
            animation: pulseText 2s infinite;
        }

        @keyframes pulseText {
            0%, 100% { 
                box-shadow: 0 0 10px #ffd700;
            }
            50% { 
                box-shadow: 0 0 20px #ffd700, 0 0 30px #ff6b81;
                transform: scale(1.05);
            }
        }

        /* Platform Tabs */
        .platform-tabs {
            display: flex;
            gap: 0.8rem;
            margin: 1.5rem 0 1rem;
        }

        .platform-tab {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #ff6b8133;
            border-radius: 30px;
            padding: 0.6rem 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            flex: 1;
            text-align: center;
        }

        .platform-tab i {
            margin-right: 0.3rem;
            font-size: 0.9rem;
        }

        .platform-tab.active {
            background: #ff6b81;
            border-color: #ff6b81;
            color: white;
        }

        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            margin: 1rem 0;
        }

        .product-card {
            background: rgba(20, 28, 40, 0.9);
            border: 1px solid #ff6b8133;
            border-radius: 20px;
            padding: 1.2rem 1rem;
            position: relative;
        }

        .product-badge {
            position: absolute;
            top: 0.8rem;
            right: 0.8rem;
            background: #ff3860;
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 15px;
            font-size: 0.6rem;
            font-weight: 700;
        }

        .badge-student { background: #00b894; }

        .product-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .product-name {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }

        .product-desc {
            font-size: 0.8rem;
            color: #94a9c5;
            background: rgba(0, 0, 0, 0.2);
            padding: 0.6rem;
            border-radius: 10px;
            margin: 0.6rem 0;
            border-left: 3px solid #ff9f7c;
        }

        .product-price {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffb347;
            margin: 0.6rem 0;
        }

        .product-price::before {
            content: 'Rp';
            font-size: 0.8rem;
            color: #94a9c5;
            margin-right: 0.2rem;
        }

        /* Buttons */
        .card-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.8rem;
        }

        .btn-detail, .btn-channel {
            flex: 1;
            padding: 0.6rem 0.3rem;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.8rem;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            text-decoration: none;
            min-height: 40px;
        }

        .btn-detail {
            background: transparent;
            border: 2px solid #ff6b81;
            color: #ff6b81;
        }

        .btn-channel {
            background: #128C7E;
            color: white;
            border: 2px solid #128C7E;
        }

        /* Modal - Optimasi Mobile */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 999999;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a2436;
            border-radius: 20px;
            width: 100%;
            max-width: 350px;
            padding: 1.5rem;
            position: relative;
            border: 2px solid #ffd700;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-close {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #ffd700;
            font-size: 1.5rem;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            padding-right: 30px;
        }

        .modal-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffd700;
            margin: 1rem 0;
            display: inline-block;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            background: rgba(0,0,0,0.3);
        }

        .modal-icon {
            font-size: 3.5rem;
            text-align: center;
            margin: 1rem 0;
            background: rgba(255,255,255,0.05);
            padding: 1rem;
            border-radius: 20px;
        }

        .modal-desc {
            background: #0f172a;
            padding: 1rem;
            border-radius: 15px;
            margin: 1rem 0;
            color: #e2e8f0;
            font-size: 0.9rem;
            line-height: 1.6;
            border-left: 4px solid #ffd700;
        }

        .modal-channel-btn {
            display: flex;
            background: #25D366;
            color: white;
            text-decoration: none;
            padding: 0.8rem;
            border-radius: 30px;
            font-weight: 600;
            margin-top: 1rem;
            width: 100%;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 1rem;
        }

        /* Contact Page - Dengan Foto Alien BERGERAK */
        .contact-wrapper {
            background: rgba(20, 28, 40, 0.6);
            border-radius: 20px;
            padding: 1.2rem;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin: 0.8rem 0;
            font-size: 0.9rem;
            word-break: break-word;
        }

        .alien-location {
            background: #1f2a3c;
            border-radius: 20px;
            padding: 1.2rem;
            text-align: center;
            border: 2px dashed #ff6b8133;
        }

        .alien-image-placeholder {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 1rem;
            border: 3px solid #f1c40f;
            animation: floatUtama 3s ease-in-out infinite;
        }

        @keyframes floatUtama {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        /* ALIEN GALLERY - DENGAN ANIMASI BERGERAK */
        .alien-gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            margin: 1.5rem 0 1rem;
        }

        .alien-mini {
            background: #2c3e50;
            border-radius: 15px;
            padding: 0.8rem 0.3rem;
            text-align: center;
            border: 2px solid transparent;
            transition: all 0.3s;
            animation-duration: 2s;
            animation-iteration-count: infinite;
            animation-timing-function: ease-in-out;
        }

        /* Animasi BERBEDA untuk setiap alien */
        .alien-mini:nth-child(1) {
            animation-name: bounceAlien;
            border-color: #ffd700;
            background: linear-gradient(145deg, #2c3e50, #1e2a3a);
        }

        .alien-mini:nth-child(2) {
            animation-name: wobbleAlien;
            border-color: #7eff00;
            background: linear-gradient(145deg, #2c3e50, #1a2f3f);
            animation-delay: 0.2s;
        }

        .alien-mini:nth-child(3) {
            animation-name: spinAlien;
            border-color: #ff6b81;
            background: linear-gradient(145deg, #2c3e50, #2a1e3a);
            animation-delay: 0.4s;
        }

        .alien-mini:nth-child(4) {
            animation-name: pulseAlien;
            border-color: #00ffff;
            background: linear-gradient(145deg, #2c3e50, #3a1e2a);
            animation-delay: 0.6s;
        }

        /* Keyframes animasi alien */
        @keyframes bounceAlien {
            0%, 100% { 
                transform: translateY(0) scale(1);
                box-shadow: 0 5px 15px rgba(255,215,0,0.3);
            }
            50% { 
                transform: translateY(-8px) scale(1.05);
                box-shadow: 0 15px 25px rgba(255,215,0,0.6);
            }
        }

        @keyframes wobbleAlien {
            0%, 100% { 
                transform: rotate(0deg) translateX(0);
            }
            25% { 
                transform: rotate(-5deg) translateX(-3px);
            }
            75% { 
                transform: rotate(5deg) translateX(3px);
            }
        }

        @keyframes spinAlien {
            0% { 
                transform: rotate(0deg) scale(1);
            }
            50% { 
                transform: rotate(180deg) scale(1.1);
            }
            100% { 
                transform: rotate(360deg) scale(1);
            }
        }

        @keyframes pulseAlien {
            0%, 100% { 
                transform: scale(1);
                opacity: 0.8;
            }
            50% { 
                transform: scale(1.15);
                opacity: 1;
                filter: brightness(1.2);
            }
        }

        /* Animasi untuk emoji di dalam alien */
        .alien-mini span {
            display: inline-block;
            font-size: 1.8rem;
            margin-bottom: 0.2rem;
        }

        .alien-mini:nth-child(1) span {
            animation: bounceEmoji 1.5s infinite;
        }

        .alien-mini:nth-child(2) span {
            animation: shakeEmoji 2s infinite;
        }

        .alien-mini:nth-child(3) span {
            animation: rotateEmoji 3s infinite linear;
        }

        .alien-mini:nth-child(4) span {
            animation: glowEmoji 2s infinite;
        }

        @keyframes bounceEmoji {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        @keyframes shakeEmoji {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            75% { transform: rotate(10deg); }
        }

        @keyframes rotateEmoji {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes glowEmoji {
            0%, 100% { 
                filter: drop-shadow(0 0 5px #00ffff);
                transform: scale(1);
            }
            50% { 
                filter: drop-shadow(0 0 15px #00ffff);
                transform: scale(1.2);
            }
        }

        /* Hover effect - pause animasi */
        .alien-mini:hover {
            animation-play-state: paused;
            transform: scale(1.1);
            z-index: 10;
            border-width: 3px;
        }

        .alien-mini:hover span {
            animation-play-state: paused;
        }

        .alien-mini p {
            font-size: 0.65rem;
            font-weight: 600;
            color: #fff;
            margin-top: 0.3rem;
        }

        .footer {
            text-align: center;
            padding: 1.2rem;
            margin-top: 1.5rem;
            border-top: 1px solid #ff6b8133;
            color: #94a9c5;
            font-size: 0.8rem;
        }

        /* AIM Lock Menu */
        .aimlock-menu {
            background: #1a2436;
            border-radius: 20px;
            padding: 1.2rem;
            margin: 0.8rem 0 1.5rem;
            border: 2px solid #ffd700;
        }

        .aimlock-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid #ffd700;
        }

        .aimlock-header i {
            font-size: 1.5rem;
            color: #ffd700;
        }

        .aimlock-header h3 {
            font-size: 1.3rem;
            color: #ffd700;
        }

        .aimlock-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.8rem;
        }

        .aimlock-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #ff6b8133;
            cursor: pointer;
        }

        .aimlock-item:hover {
            border-color: #ffd700;
            background: rgba(255,215,0,0.1);
        }

        .aimlock-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .aimlock-info span {
            font-size: 1.5rem;
        }

        .aimlock-info h4 {
            font-size: 0.9rem;
        }

        .aimlock-info p {
            font-size: 0.7rem;
            color: #94a9c5;
        }

        .aimlock-price {
            font-size: 1rem;
            font-weight: 700;
            color: #ffd700;
            white-space: nowrap;
        }

        .aimlock-price::before {
            content: 'Rp';
            font-size: 0.7rem;
            color: #94a9c5;
            margin-right: 0.2rem;
        }

        /* Efek Background */
        .particles-container, .static-particles, .rain-container {
            pointer-events: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .rain-container { z-index: 20; display: none; }
        .rain-container.active { display: block; }

        /* Utility */
        .platform-content { display: none; }
        .platform-content.active { display: block; }
    </style>
</head>
<body>
    <!-- Efek Background -->
    <div class="particles-container" id="particles-container"></div>
    <div class="static-particles" id="static-particles"></div>
    <div class="rain-container" id="rain-container"></div>
    <div class="water-puddle" id="waterPuddle"></div>

    <nav class="navbar">
        <div class="logo">JURAGAN X REZXIT</div>
        <div class="menu-toggle" id="menuToggle">
            <i class="fas fa-bars"></i>
        </div>
