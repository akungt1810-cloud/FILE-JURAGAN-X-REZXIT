<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>JURAGAN X REZXIT · File & Mod Premium FF</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0e17;
            color: #ffffff;
            line-height: 1.6;
            position: relative;
            overflow-x: hidden;
        }

        /* Navbar - Mobile First */
        .navbar {
            background: rgba(10, 15, 25, 0.95);
            padding: 1rem 5%;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            border-bottom: 1px solid #ff6b8133;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f7b731, #ff6b81);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Mobile Menu */
        .nav-links {
            display: none;
            width: 100%;
            flex-direction: column;
            background: rgba(10, 15, 25, 0.95);
            padding: 1.5rem;
            border-radius: 20px;
            margin-top: 1rem;
            gap: 1rem;
            border: 1px solid #ff6b8133;
            backdrop-filter: blur(10px);
        }

        .nav-links.show {
            display: flex;
        }

        .nav-links a {
            text-decoration: none;
            font-weight: 600;
            color: #cbd5e8;
            font-size: 1.1rem;
            transition: 0.2s;
            padding: 0.8rem 0;
            border-bottom: 2px solid transparent;
        }

        .nav-links a:hover,
        .nav-links a.active {
            border-bottom-color: #ff6b81;
            color: #ffffff;
        }

        .menu-toggle {
            display: block;
            font-size: 2rem;
            color: #ff6b81;
            cursor: pointer;
        }

        /* Container */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 1.5rem 5%;
            position: relative;
            z-index: 10;
        }

        /* Hero Section - Mobile */
        .hero-title {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1.2;
            background: linear-gradient(135deg, #ffffff, #ffb347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        .hero-sub {
            font-size: 1rem;
            color: #a0b5d4;
            margin-bottom: 1.5rem;
        }

        /* Features Grid - Mobile */
        .features-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 2rem 0;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #ff6b8133;
            border-radius: 20px;
            padding: 1.2rem 0.8rem;
            text-align: center;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }

        .feature-card:hover {
            border-color: #ff6b81;
            transform: translateY(-5px);
            background: rgba(255, 107, 129, 0.1);
        }

        .feature-icon {
            font-size: 2rem;
            color: #ff9f7c;
            margin-bottom: 0.8rem;
        }

        .feature-card h4 {
            font-size: 1rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        .feature-card p {
            font-size: 0.8rem;
            color: #94a9c5;
        }

        /* Section Label */
        .section-label {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 1.5rem 0 0.5rem;
            background: linear-gradient(135deg, #fcb69f, #ffd6a5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .section-desc {
            color: #94a9c5;
            font-size: 1rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid #ff6b81;
            padding-left: 1rem;
        }

        /* Student Special Banner */
        .student-banner {
            background: linear-gradient(135deg, #ff6b81, #ff9f7c);
            border-radius: 30px;
            padding: 1.5rem;
            margin: 2rem 0;
            text-align: center;
            border: 2px solid #ffd700;
            box-shadow: 0 10px 30px rgba(255, 107, 129, 0.3);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .student-banner:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 40px rgba(255, 107, 129, 0.5);
        }

        .student-banner::before {
            content: '🔥';
            position: absolute;
            font-size: 5rem;
            opacity: 0.1;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
        }

        .student-banner::after {
            content: '🔥';
            position: absolute;
            font-size: 5rem;
            opacity: 0.1;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
        }

        .student-banner h3 {
            font-size: 2rem;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 2px 2px 0 #00000030;
            margin-bottom: 0.5rem;
        }

        .student-banner p {
            font-size: 1.1rem;
            color: #1a1e2b;
            font-weight: 600;
        }

        .clickable-text {
            background: #1a1e2b;
            color: #ffd700;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            display: inline-block;
            margin-top: 1rem;
            font-weight: 700;
            border: 2px solid white;
            font-size: 1.2rem;
            animation: pulse-glow 1.5s infinite;
            cursor: pointer;
            transition: all 0.3s;
        }

        .clickable-text:hover {
            background: #ffd700;
            color: #1a1e2b;
            transform: scale(1.05);
            box-shadow: 0 0 30px #ffd700;
        }

        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 10px #ffd700;
            }
            50% {
                box-shadow: 0 0 30px #ffd700, 0 0 50px #ff6b81;
            }
        }

        /* Platform Tabs */
        .platform-tabs {
            display: flex;
            gap: 1rem;
            margin: 2rem 0 1.5rem;
            flex-wrap: wrap;
        }

        .platform-tab {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #ff6b8133;
            border-radius: 50px;
            padding: 0.8rem 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            flex: 1;
            text-align: center;
            min-width: 120px;
            backdrop-filter: blur(5px);
        }

        .platform-tab i {
            margin-right: 0.5rem;
            color: #ff9f7c;
        }

        .platform-tab.active {
            background: #ff6b81;
            border-color: #ff6b81;
            color: white;
        }

        .platform-tab.active i {
            color: white;
        }

        /* Platform Content */
        .platform-content {
            display: none;
        }

        .platform-content.active {
            display: block;
        }

        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            margin: 1.5rem 0;
        }

        .product-card {
            background: rgba(20, 28, 40, 0.8);
            border: 1px solid #ff6b8133;
            border-radius: 30px;
            padding: 1.5rem 1.2rem;
            position: relative;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }

        .product-card:hover {
            border-color: #ff6b81;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px #ff6b8120;
            background: rgba(30, 40, 55, 0.9);
        }

        .product-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: #ff3860;
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-hot { background: #fa8231; }
        .badge-best { background: #f7b731; color: #1a1e2b; }
        .badge-popular { background: #2d98da; }
        .badge-student { background: #00b894; color: white; }

        .product-icon {
            font-size: 3rem;
            margin-bottom: 0.8rem;
            text-align: center;
        }

        .product-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        .product-desc {
            font-size: 0.85rem;
            color: #94a9c5;
            background: rgba(0, 0, 0, 0.2);
            padding: 0.7rem 1rem;
            border-radius: 15px;
            margin: 0.8rem 0;
            min-height: 3.5rem;
            border-left: 3px solid #ff9f7c;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffb347;
            margin: 0.8rem 0;
        }

        .product-price::before {
            content: 'Rp';
            font-size: 0.9rem;
            font-weight: 500;
            color: #94a9c5;
            margin-right: 0.2rem;
        }

        /* Buttons */
        .card-actions {
            display: flex;
            gap: 0.8rem;
            margin-top: 1rem;
        }

        .btn-detail, .btn-channel {
            flex: 1;
            padding: 0.8rem 0.5rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            text-decoration: none;
            transition: 0.2s;
            min-height: 44px;
        }

        .btn-detail {
            background: transparent;
            border: 2px solid #ff6b81;
            color: #ff6b81;
        }

        .btn-detail:hover {
            background: #ff6b81;
            color: white;
        }

        .btn-channel {
            background: #128C7E;
            color: white;
            border: 2px solid #128C7E;
        }

        .btn-channel:hover {
            background: #075E54;
        }

        /* Modal - PERBAIKAN TOTAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 999999;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex !important;
        }

        .modal-content {
            background: #1a2436;
            border-radius: 30px;
            max-width: 500px;
            width: 100%;
            padding: 2rem;
            position: relative;
            border: 3px solid #ffd700;
            animation: modalPop 0.3s ease;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            margin: auto;
        }

        @keyframes modalPop {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(20px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #ffd700;
            font-size: 2rem;
            cursor: pointer;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
            z-index: 10;
        }

        .modal-close:hover {
            background: rgba(255, 215, 0, 0.3);
            transform: rotate(90deg);
        }

        .modal-content h2 {
            font-size: 2.2rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 0.5rem;
            padding-right: 40px;
            line-height: 1.2;
        }

        .modal-price {
            font-size: 2.2rem;
            font-weight: 700;
            color: #ffd700;
            margin: 1.2rem 0;
            background: rgba(0, 0, 0, 0.3);
            display: inline-block;
            padding: 0.6rem 1.8rem;
            border-radius: 50px;
            border: 2px solid #ffd700;
        }

        .modal-icon {
            font-size: 5rem;
            text-align: center;
            margin: 1.5rem 0;
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 30px;
        }

        .modal-desc {
            background: #0f172a;
            padding: 1.8rem;
            border-radius: 20px;
            margin: 1.8rem 0;
            color: #e2e8f0;
            line-height: 1.8;
            font-size: 1.1rem;
            border-left: 5px solid #ffd700;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }

        .modal-channel-btn {
            display: flex;
            background: #25D366;
            color: white;
            text-decoration: none;
            padding: 1.2rem;
            border-radius: 50px;
            font-weight: 700;
            margin-top: 1.5rem;
            width: 100%;
            text-align: center;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            font-size: 1.2rem;
            transition: all 0.3s;
            border: 2px solid #25D366;
        }

        .modal-channel-btn:hover {
            background: transparent;
            color: #25D366;
        }

        /* Contact Page - Dengan Foto Alien */
        .contact-wrapper {
            background: rgba(20, 28, 40, 0.6);
            border-radius: 30px;
            padding: 1.5rem;
            border: 1px solid #ff6b8133;
            backdrop-filter: blur(5px);
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        .contact-info h3 {
            font-size: 1.6rem;
            color: #ff9f7c;
            margin-bottom: 1.5rem;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.2rem 0;
            color: #cbd5e8;
            font-size: 1rem;
            word-break: break-word;
        }

        .contact-item i {
            width: 1.8rem;
            color: #ff6b81;
            font-size: 1.2rem;
        }

        /* Lokasi dengan Foto Alien */
        .alien-location {
            background: #1f2a3c;
            border-radius: 25px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            color: #94a9c5;
            border: 2px dashed #ff6b8133;
            min-height: 300px;
            backdrop-filter: blur(5px);
        }

        .alien-image-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            width: 100%;
        }

        .alien-emoji-large {
            font-size: 5rem;
            filter: drop-shadow(0 0 15px #7eff00);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .alien-image-placeholder {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4.5rem;
            border: 4px solid #f1c40f;
            box-shadow: 0 0 30px #2ecc71;
        }

        .alien-location-text {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #94a9c5;
            font-size: 0.95rem;
            margin-top: 0.5rem;
        }

        .alien-location-text i {
            color: #ff6b81;
        }

        /* Alien Gallery - Dengan Animasi */
        .alien-gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.8rem;
            margin: 1rem 0;
        }

        .alien-mini {
            background: #2c3e50;
            border-radius: 15px;
            padding: 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
            border: 1px solid #ff6b8133;
            transition: all 0.3s ease;
            animation-duration: 3s;
            animation-iteration-count: infinite;
            animation-timing-function: ease-in-out;
            position: relative;
            cursor: pointer;
        }

        /* Animasi berbeda untuk setiap alien */
        .alien-mini:nth-child(1) {
            animation-name: floatAlien1;
            background: linear-gradient(145deg, #2c3e50, #1e2a3a);
            border-color: #ffd700;
        }

        .alien-mini:nth-child(2) {
            animation-name: floatAlien2;
            background: linear-gradient(145deg, #2c3e50, #1a2f3f);
            border-color: #7eff00;
            animation-delay: 0.5s;
        }

        .alien-mini:nth-child(3) {
            animation-name: floatAlien3;
            background: linear-gradient(145deg, #2c3e50, #2a1e3a);
            border-color: #ff6b81;
            animation-delay: 1s;
        }

        .alien-mini:nth-child(4) {
            animation-name: floatAlien4;
            background: linear-gradient(145deg, #2c3e50, #3a1e2a);
            border-color: #00ffff;
            animation-delay: 1.5s;
        }

        /* Keyframes untuk animasi */
        @keyframes floatAlien1 {
            0%, 100% {
                transform: translateY(0) rotate(0deg) scale(1);
                box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
            }
            25% {
                transform: translateY(-10px) rotate(-5deg) scale(1.05);
                box-shadow: 0 15px 25px rgba(255, 215, 0, 0.6);
            }
            50% {
                transform: translateY(-5px) rotate(5deg) scale(1.1);
                box-shadow: 0 20px 30px rgba(255, 215, 0, 0.8);
            }
            75% {
                transform: translateY(-8px) rotate(-3deg) scale(1.05);
                box-shadow: 0 15px 25px rgba(255, 215, 0, 0.6);
            }
        }

        @keyframes floatAlien2 {
            0%, 100% {
                transform: translateY(0) translateX(0) scale(1);
                box-shadow: 0 5px 15px rgba(126, 255, 0, 0.3);
            }
            33% {
                transform: translateY(-8px) translateX(5px) scale(1.08);
                box-shadow: 0 15px 25px rgba(126, 255, 0, 0.6);
            }
            66% {
                transform: translateY(-12px) translateX(-5px) scale(1.12);
                box-shadow: 0 20px 30px rgba(126, 255, 0, 0.8);
            }
        }

        @keyframes floatAlien3 {
            0%, 100% {
                transform: translateY(0) rotateY(0deg) scale(1);
                box-shadow: 0 5px 15px rgba(255, 107, 129, 0.3);
            }
            25% {
                transform: translateY(-10px) rotateY(180deg) scale(1.1);
                box-shadow: 0 15px 25px rgba(255, 107, 129, 0.6);
            }
            50% {
                transform: translateY(-5px) rotateY(360deg) scale(1.15);
                box-shadow: 0 20px 30px rgba(255, 107, 129, 0.8);
            }
            75% {
                transform: translateY(-8px) rotateY(180deg) scale(1.1);
                box-shadow: 0 15px 25px rgba(255, 107, 129, 0.6);
            }
        }

        @keyframes floatAlien4 {
            0%, 100% {
                transform: translate(0) skew(0deg);
                box-shadow: 0 5px 15px rgba(0, 255, 255, 0.3);
                filter: hue-rotate(0deg);
            }
            10% {
                transform: translate(-2px, 2px) skew(5deg);
                filter: hue-rotate(90deg);
                box-shadow: 0 15px 25px rgba(0, 255, 255, 0.6);
            }
            20% {
                transform: translate(2px, -2px) skew(-5deg);
                filter: hue-rotate(180deg);
                box-shadow: 0 20px 30px rgba(0, 255, 255, 0.8);
            }
            30% {
                transform: translate(-2px, -2px) skew(5deg);
                filter: hue-rotate(270deg);
            }
            40% {
                transform: translate(2px, 2px) skew(-5deg);
                filter: hue-rotate(360deg);
            }
            50% {
                transform: translate(0) skew(0deg);
                filter: hue-rotate(0deg);
            }
        }

        /* Hover effect - animasi berhenti dan scale lebih besar */
        .alien-mini:hover {
            animation-play-state: paused;
            transform: scale(1.2);
            z-index: 10;
            cursor: pointer;
            filter: brightness(1.2);
            border-width: 2px;
        }

        /* Efek tambahan: sinar di sekitar alien */
        .alien-mini::after {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border-radius: 20px;
            background: linear-gradient(45deg, 
                rgba(255,215,0,0.3), 
                rgba(126,255,0,0.3), 
                rgba(255,107,129,0.3),
                rgba(0,255,255,0.3));
            filter: blur(10px);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .alien-mini:hover::after {
            opacity: 1;
        }

        /* Animasi untuk emoji di dalam */
        .alien-mini span {
            display: inline-block;
            font-size: 2rem;
        }

        .alien-mini:nth-child(1) span {
            animation: spin 3s infinite linear;
        }

        .alien-mini:nth-child(2) span {
            animation: pulse 1.5s infinite ease-in-out;
        }

        .alien-mini:nth-child(3) span {
            animation: wobble 2.5s infinite;
        }

        .alien-mini:nth-child(4) span {
            animation: bounce 1.8s infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        @keyframes wobble {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-15deg); }
            75% { transform: rotate(15deg); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .footer {
            text-align: center;
            padding: 1.5rem;
            margin-top: 2rem;
            border-top: 1px solid #ff6b8133;
            color: #94a9c5;
            font-size: 0.9rem;
            position: relative;

            height: 20px;

            position: absolute;
            border-radius: 50%;

            // Update tab aktif
            document.querySelectorAll('.platform-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Update content aktif
            document.querySelectorAll('.platform-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById(`${platform}-content`).classList.add('active');
        };

        // Fungsi untuk membuka modal - PASTIKAN INI
        window.openModal = function(productId, platform) {
            let products = [];
            if (platform === 'android') {
                products = androidProducts;
            } else if (platform === 'ios') {
                products = iosProducts;
            } else if (platform === 'student') {
                products = studentProducts;
            }
            
            const product = products.find(p => p.id === productId);
            if (!product) return;

            modalContent.innerHTML = `
                <h2>${product.name}</h2>
                <div class="modal-price">Rp ${product.price.toLocaleString('id-ID')}</div>
                <div class="modal-icon">${product.icon}</div>
                <div class="modal-desc">${product.fullDesc}</div>
                <a href="${channelUrl}" target="_blank" class="modal-channel-btn">
                    <i class="fab fa-whatsapp"></i> Order via Channel
                </a>
            `;

            // TAMPILKAN MODAL
            modal.classList.add('active');
            
            // Cegah scroll di background
            document.body.style.overflow = 'hidden';
        };

        // Event listener untuk navigasi
        navLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                renderPage(link.dataset.page);
            });
        });

        // Toggle menu mobile
        menuToggle.addEventListener('click', () => {
            navLinksContainer.classList.toggle('show');
        });

        // Tutup modal
        closeModal.addEventListener('click', () => {
            modal.classList.remove('active');
            document.body.style.overflow = ''; // Kembalikan scroll
        });

        window.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
                document.body.style.overflow = ''; // Kembalikan scroll
            }
        });

        // Tampilkan halaman beranda saat pertama kali dibuka
        document.addEventListener('DOMContentLoaded', function() {
            renderPage('home');
        });
    </script>

    <!-- Script Efek Air Jatuh Putih -->
    <script>
        (function() {
            const rainContainer = document.getElementById('rain-container');
            let rainInterval;
            let cleanupInterval;
            let isRaining = false;
            
            const rainCount = 100;
            
            function createRaindrop() {
                const raindrop = document.createElement('div');
                raindrop.className = 'raindrop';
                
                const left = Math.random() * 100;
                const duration = Math.random() * 2 + 1;
                const delay = Math.random() * 5;
                const width = Math.random() * 2 + 1;
                const height = Math.random() * 25 + 10;
                const blur = Math.random() * 3;
                
                raindrop.style.left = left + '%';
                raindrop.style.animationDuration = duration + 's';
                raindrop.style.animationDelay = delay + 's';
                raindrop.style.width = width + 'px';
                raindrop.style.height = height + 'px';
                raindrop.style.filter = `blur(${blur * 0.2}px)`;
                
                rainContainer.appendChild(raindrop);
            }
            
            function createDewDrops() {
                for (let i = 0; i < 15; i++) {
                    const dew = document.createElement('div');
                    dew.className = 'dew-drop';
                    
                    const left = Math.random() * 100;
                    const top = Math.random() * 30;
                    const size = Math.random() * 10 + 5;
                    const delay = Math.random() * 5;
                    
                    dew.style.left = left + '%';
                    dew.style.top = top + '%';
                    dew.style.width = size + 'px';
                    dew.style.height = size + 'px';
                    dew.style.animationDelay = delay + 's';
                    
                    rainContainer.appendChild(dew);
                }
            }
            
            window.startRain = function() {
                if (isRaining) return;
                isRaining = true;
                
                rainContainer.innerHTML = '';
                
                for (let i = 0; i < rainCount; i++) {
                    createRaindrop();
                }
                
                createDewDrops();
                
                rainInterval = setInterval(() => {
                    if (rainContainer.classList.contains('active')) {
                        const newDrops = Math.floor(Math.random() * 3) + 2;
                        for (let i = 0; i < newDrops; i++) {
                            createRaindrop();
                        }
                    }
                }, 2000);
                
                cleanupInterval = setInterval(() => {
                    if (rainContainer.classList.contains('active')) {
                        const raindrops = document.querySelectorAll('.raindrop');
                        if (raindrops.length > rainCount * 1.5) {
                            for (let i = 0; i < raindrops.length - rainCount; i++) {
                                if (raindrops[i]) raindrops[i].remove();
                            }
                        }
                    }
                }, 8000);
            };
            
            window.stopRain = function() {
                isRaining = false;
                if (rainInterval) clearInterval(rainInterval);
                if (cleanupInterval) clearInterval(cleanupInterval);
                rainContainer.innerHTML = '';
            };
            
            // Efek ripple saat klik
            document.addEventListener('click', function(e) {
                if (rainContainer.classList.contains('active')) {
                    const ripple = document.createElement('div');
                    ripple.className = 'ripple';
                    ripple.style.left = e.clientX + 'px';
                    ripple.style.top = e.clientY + 'px';
                    document.body.appendChild(ripple);
                    
                    setTimeout(() => {
                        ripple.remove();
                    }, 1500);
                }
            });
        })();
    </script>

    <!-- Script Efek Bintik-bintik -->
    <script>
        (function() {
            const particlesContainer = document.getElementById('particles-container');
            const staticContainer = document.getElementById('static-particles');
            
            if (!particlesContainer || !staticContainer) return;
            
            // Konfigurasi
            const movingParticleCount = 40;  // Bintik yang bergerak
            const staticParticleCount = 60;   // Bintik statis yang berkedip
            
            // Warna-warna ungu dan putih
            const colors = [
                'radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(138,43,226,0.7))',
                'radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(148,0,211,0.6))',
                'radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(153,50,204,0.7))',
                'radial-gradient(circle at 30% 30%, rgba(255,255,255,1), rgba(186,85,211,0.5))',
                'radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(128,0,128,0.6))'
            ];
            
            // Buat bintik bergerak
            for (let i = 0; i < movingParticleCount; i++) {
                createMovingParticle();
            }
            
            // Buat bintik statis yang berkedip
            for (let i = 0; i < staticParticleCount; i++) {
                createStaticParticle();
            }
            
            function createMovingParticle() {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                // Random ukuran (2px - 8px)
                const size = Math.random() * 6 + 2;
                
                // Random posisi horizontal
                const left = Math.random() * 100;
                
                // Random durasi animasi (8s - 20s)
                const duration = Math.random() * 12 + 8;
                
                // Random delay (0 - 15s)
                const delay = Math.random() * 15;
                
                // Pilih warna random
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = left + '%';
                particle.style.animationDuration = duration + 's';
                particle.style.animationDelay = delay + 's';
                particle.style.background = color;
                
                // Random opacity awal
                particle.style.opacity = Math.random() * 0.5 + 0.2;
                
                particlesContainer.appendChild(particle);
            }
            
            function createStaticParticle() {
                const particle = document.createElement('div');
                particle.className = 'static-particle';
                
                // Random ukuran (1px - 5px)
                const size = Math.random() * 4 + 1;
                
                // Random posisi (seluruh layar)
                const left = Math.random() * 100;
                const top = Math.random() * 100;
                
                // Random durasi kedip (1s - 5s)
                const duration = Math.random() * 4 + 1;
                
                // Random delay
                const delay = Math.random() * 5;
                
                // Pilih warna random
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = left + '%';
                particle.style.top = top + '%';
                particle.style.animationDuration = duration + 's';
                particle.style.animationDelay = delay + 's';
                particle.style.background = color;
                
                // Random opacity awal
                particle.style.opacity = Math.random() * 0.6 + 0.2;
                
                staticContainer.appendChild(particle);
            }
            
            // Tambah bintik baru secara berkala (untuk variasi)
            setInterval(() => {
                if (document.querySelectorAll('.particle').length < movingParticleCount + 5) {
                    createMovingParticle();
                }
                
                // Hapus bintik yang sudah terlalu banyak
                const particles = document.querySelectorAll('.particle');
                if (particles.length > movingParticleCount * 1.5) {
                    for (let i = 0; i < particles.length - movingParticleCount; i++) {
                        if (particles[i]) particles[i].remove();
                    }
                }
            }, 5000);
            
            // Efek parallax saat scroll (bintik bergerak lebih lambat)
            window.addEventListener('scroll', () => {
                const scrollY = window.scrollY;
                const particles = document.querySelectorAll('.static-particle');
                particles.forEach((particle, index) => {
                    // Efek gerakan halus saat scroll
                    const speed = 0.1 + (index % 3) * 0.05;
                    const yOffset = scrollY * speed;
                    particle.style.transform = `translateY(${yOffset}px)`;
                });
            });
            
        })();
    </script>
